name: Build NINA Plugin

on:
  push:
    paths:
      - 'plugin/**'
      - '.github/workflows/build-plugin.yml'
    branches: ["main"]
  pull_request:
    paths:
      - 'plugin/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore NINA.AstroCircular.SkyWaver.sln

      - name: Build Release
        run: dotnet build NINA.AstroCircular.SkyWaver.sln --configuration Release --no-restore -p:Platform=x64

      - name: Fetch CreateManifest script
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/isbeorn/nina.plugin.manifests/main/tools/CreateManifest.ps1" -OutFile "CreateManifest.ps1"

      - name: Generate manifest and archive
        shell: pwsh
        run: |
          $dllPath = "NINA.AstroCircular.SkyWaver/bin/x64/Release/NINA.CollimationHelper.SkyWave.dll"

          # Read version from built DLL
          $fileVersion = (Get-Item $dllPath).VersionInfo.FileVersion
          $versionParts = $fileVersion.Split(".")
          $semver = "$($versionParts[0]).$($versionParts[1]).$($versionParts[2])"
          Write-Output "Plugin version: $semver (file version: $fileVersion)"

          # Installer URL for the stable GitHub release
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/v${semver}/NINA.CollimationHelper.SkyWave.${fileVersion}.zip"

          # Run CreateManifest.ps1 — generates ZIP (just the DLL) and manifest.json
          ./CreateManifest.ps1 -file $dllPath -createArchive -appendVersionToArchive -installerUrl $installerUrl

          # Store version for later steps
          "PLUGIN_VERSION=$semver" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PLUGIN_FILE_VERSION=$fileVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: |
            plugin/NINA.CollimationHelper.SkyWave.*.zip
            plugin/manifest.json

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $semver = $env:PLUGIN_VERSION
          $fileVersion = $env:PLUGIN_FILE_VERSION
          $zipFile = "NINA.CollimationHelper.SkyWave.${fileVersion}.zip"
          $tag = "v${semver}-build.${{ github.run_number }}"
          $title = "Collimation Helper for SkyWave v${semver} (build ${{ github.run_number }})"
          $notes = @"
          ## Collimation Helper for SkyWave — v${semver}

          Native NINA plugin for automated SkyWave telescope collimation.

          ### Install via NINA Plugin Manager (recommended)
          Options > Plugins > Available > search for "SkyWave"

          ### Manual Install
          1. Download ``${zipFile}`` below
          2. Extract to ``%localappdata%\NINA\3\Plugins\``
          3. Restart N.I.N.A.

          > Report issues at https://github.com/${{ github.repository }}/issues
          "@

          # Delete previous pre-release builds for this version
          gh release list --repo $env:GITHUB_REPOSITORY --limit 20 --json tagName --jq '.[].tagName' | ForEach-Object {
            if ($_ -like "v${semver}-build.*") {
              gh release delete $_ --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag 2>$null
            }
          }
          gh release create $tag $zipFile "manifest.json" --repo $env:GITHUB_REPOSITORY --title $title --notes $notes --prerelease
