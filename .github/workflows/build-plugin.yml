name: Build NINA Plugin

on:
  push:
    paths:
      - 'plugin/**'
    branches: ["main"]
  pull_request:
    paths:
      - 'plugin/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore NINA.AstroCircular.SkyWaver.sln

      - name: Build Release
        run: dotnet build NINA.AstroCircular.SkyWaver.sln --configuration Release --no-restore -p:Platform=x64

      - name: Package installer zip
        shell: pwsh
        run: |
          $stagingDir = "staging/AstroCircular.SkyWaver"
          New-Item -ItemType Directory -Force -Path $stagingDir
          Copy-Item "NINA.AstroCircular.SkyWaver/bin/x64/Release/NINA.AstroCircular.SkyWaver.dll" $stagingDir
          Copy-Item "install.bat" "staging/"
          Copy-Item "uninstall.bat" "staging/"
          @"
          AstroCircular SkyWaver for N.I.N.A. — v0.1.0
          ==============================================

          INSTALL:  Double-click install.bat (close NINA first!)
          MANUAL:   Copy the AstroCircular.SkyWaver folder to
                    %localappdata%\NINA\3\Plugins\

          UNINSTALL: Double-click uninstall.bat

          After installing, restart N.I.N.A. and find the plugin
          in Options > Plugins and the sequence instructions
          under the "AstroCircular SKW" category.

          https://github.com/joergs-git/astrocircular-skywaver-for-nina
          "@ | Out-File -Encoding utf8 "staging/README.txt"
          Compress-Archive -Path "staging/*" -DestinationPath "AstroCircular.SkyWaver-v0.1.0.zip" -Force

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v0.1.0-build.${{ github.run_number }}"
          $title = "AstroCircular SkyWaver v0.1.0 (build ${{ github.run_number }})"
          $notes = @"
          ## AstroCircular SkyWaver for N.I.N.A. — v0.1.0

          Native NINA plugin for automated SkyWave telescope collimation.

          ### Install
          1. Download ``AstroCircular.SkyWaver-v0.1.0.zip`` below
          2. Unzip and double-click ``install.bat``
          3. Restart N.I.N.A.

          ### Sequence Instructions
          - **SKW Collimation Run** — full one-click workflow
          - **SKW Defocus** — move focuser for defocused imaging
          - **SKW Circular Capture** — capture at ring positions
          - **SKW Integrate Frames** — average, crop, bin2, save FITS

          > Early development build — report issues at https://github.com/joergs-git/astrocircular-skywaver-for-nina/issues
          "@
          # Delete previous pre-release with same base version if exists
          gh release list --repo $env:GITHUB_REPOSITORY --limit 10 --json tagName --jq '.[].tagName' | ForEach-Object {
            if ($_ -like "v0.1.0-build.*") {
              gh release delete $_ --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag 2>$null
            }
          }
          gh release create $tag "AstroCircular.SkyWaver-v0.1.0.zip" --repo $env:GITHUB_REPOSITORY --title $title --notes $notes --prerelease
